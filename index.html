<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weaving Draft</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <header>
    <h1>Weaving Draft</h1>
    <div class="toolbar">
      <select id="draft-select"></select>
      <input id="draft-name" class="draft-name-input" value="Untitled Draft" spellcheck="false">
      <button id="btn-new" class="btn" title="New draft">New</button>
      <button id="btn-save" class="btn" title="Save draft">Save</button>
      <button id="btn-delete" class="btn btn-danger" title="Delete draft">Delete</button>
      <button id="btn-settings" class="btn" title="Loom &amp; project settings">Settings</button>
    </div>
  </header>

  <div class="main-container">
    <div class="draft-area">
      <!-- Left sidebar: palette + weft repeat tools -->
      <div class="sidebar sidebar-left">
        <div class="panel" id="palette-panel"></div>
        <div class="panel" id="weft-repeat-tools"></div>
      </div>

      <!-- Center: grids -->
      <div class="draft-center">
        <!-- Warp repeat tools -->
        <div class="panel warp-tools-panel" id="warp-repeat-tools"></div>

        <div class="draft-layout">
          <!--  Row 1: spacer | threading | tieup  -->
          <div class="grid-section spacer"></div>
          <div class="grid-section threading">
            <span class="grid-label">Threading</span>
            <canvas id="threading-canvas"></canvas>
          </div>
          <div class="grid-section tieup">
            <span class="grid-label">Tie-up</span>
            <canvas id="tieup-canvas"></canvas>
          </div>

          <!--  Row 2: spacer | warp colors | spacer  -->
          <div class="grid-section spacer"></div>
          <div class="grid-section warp-colors">
            <canvas id="warp-color-canvas"></canvas>
          </div>
          <div class="grid-section spacer"></div>

          <!--  Row 3: weft colors | drawdown | treadling  -->
          <div class="grid-section weft-colors">
            <span class="grid-label">&nbsp;</span>
            <canvas id="weft-color-canvas"></canvas>
          </div>
          <div class="grid-section drawdown">
            <span class="grid-label">Drawdown</span>
            <canvas id="drawdown-canvas"></canvas>
          </div>
          <div class="grid-section treadling">
            <span class="grid-label">Treadling</span>
            <canvas id="treadling-canvas"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <dialog id="settings-dialog" class="settings-dialog">
    <form method="dialog">
      <h2>Settings</h2>

      <fieldset>
        <legend>Loom Setup</legend>
        <div class="settings-field">
          <label for="set-shafts">Shafts</label>
          <input id="set-shafts" type="number" min="2" max="32" value="4">
        </div>
        <div class="settings-field">
          <label for="set-treadles">Treadles</label>
          <input id="set-treadles" type="number" min="2" max="32" value="6">
        </div>
      </fieldset>

      <fieldset>
        <legend>Project Setup</legend>
        <div class="settings-field">
          <label for="set-warp">Warp ends</label>
          <input id="set-warp" type="number" min="1" max="2000" value="60">
        </div>
        <div class="settings-field">
          <label for="set-weft">Weft picks</label>
          <input id="set-weft" type="number" min="1" max="2000" value="60">
        </div>
        <div class="settings-field">
          <label for="set-epi">EPI <span class="optional">(optional)</span></label>
          <input id="set-epi" type="number" min="1" max="200" placeholder="—">
        </div>
        <div class="settings-field">
          <label for="set-ppi">PPI <span class="optional">(optional)</span></label>
          <input id="set-ppi" type="number" min="1" max="200" placeholder="—">
        </div>
      </fieldset>

      <div class="settings-actions">
        <button type="button" id="settings-cancel" class="btn">Cancel</button>
        <button type="button" id="settings-apply" class="btn btn-primary">Apply</button>
      </div>
    </form>
  </dialog>

  <div class="info-bar" id="info-bar"></div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
